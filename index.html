<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Leak Tester - Check Your DNS Privacy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ DNS Leak Tester</h1>
            <p class="subtitle">Check if your DNS requests are leaking</p>
        </header>

        <div class="main-content">
            <div class="test-controls">
                <button id="startTest" class="btn-primary">🚀 Start DNS Leak Test</button>
                <button id="clearResults" class="btn-secondary">🗑️ Clear Results</button>
            </div>

            <div id="publicIP" class="public-ip-box hidden">
                <strong>Your public IP:</strong> <span id="ipAddress">-</span>
            </div>

            <div id="results" class="results hidden">
                <h2>Test complete</h2>
                
                <div class="query-table-container">
                    <table class="query-table" id="queryTable">
                        <thead>
                            <tr>
                                <th>Query round</th>
                                <th>Progress...</th>
                                <th>Servers found</th>
                            </tr>
                        </thead>
                        <tbody id="queryTableBody">
                        </tbody>
                    </table>
                </div>

                <div class="dns-table-container">
                    <table class="dns-table" id="dnsTable">
                        <thead>
                            <tr>
                                <th>IP</th>
                                <th>Hostname</th>
                                <th>ISP</th>
                                <th>Country</th>
                            </tr>
                        </thead>
                        <tbody id="dnsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="testStatus" class="status-message hidden"></div>
        </div>

        <footer>
            <p>© 2024 DNS Leak Tester | Privacy-focused tool</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
